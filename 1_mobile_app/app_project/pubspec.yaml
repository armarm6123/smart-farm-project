name: app_project
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  mqtt_client: ^10.5.0
  provider: ^6.1.1
  fl_chart: ^0.66.0
  intl: ^0.19.0
  reorderable_grid_view: ^2.0.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # 🟢 1. ย้ายมาไว้ในกลุ่ม dev_dependencies ตรงนี้ให้ถูกต้อง
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

# 🟢 2. ตั้งค่าการสร้างไอคอนแอป (ชี้ไปที่โฟลเดอร์ assets/images/app_icon.png)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

# 🟢 3. ตั้งค่าหน้าเปิดแอป (Splash Screen) พื้นหลังสีขาว โชว์โลโก้ตรงกลาง
flutter_native_splash:
  color: "#ffffff"
  image: "assets/images/app_icon.png"
  android_12:
    image: "assets/images/app_icon.png"
    color: "#ffffff"

flutter:
  uses-material-design: true
  # 🟢 4. เปิดพาธให้แอป Flutter รู้จักโฟลเดอร์เก็บรูปภาพ
  assets:
    - assets/images/